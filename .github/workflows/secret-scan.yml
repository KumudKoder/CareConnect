name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan repository for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.2"
          curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (working tree)
        run: |
          gitleaks detect --source . --no-git --config .gitleaks.toml --redact --verbose
