name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan repository for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin
          gitleaks version

      - name: Run gitleaks (working tree)
        run: |
          gitleaks detect --source . --no-git --config .gitleaks.toml --redact --verbose
